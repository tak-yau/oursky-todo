# Database configuration
# Environment variables override defaults for production deployment
database {
  type = ${?DB_TYPE}"h2"
  url = ${?DB_URL}"jdbc:h2:./data/todo-db;AUTO_SERVER=TRUE"
  user = ${?DB_USER}""
  password = ${?DB_PASSWORD}""
}

# Server configuration
server {
  host = "0.0.0.0"
