pekko {
  version = "1.3.0"
  
  loggers = ["org.apache.pekko.event.slf4j.Slf4jLogger"]
  log-level = "INFO"
  logging-filter = "org.apache.pekko.event.slf4j.Slf4jLoggingFilter"
  
  actor {
    default-dispatcher {
      type = Dispatcher
      executor = "fork-join-executor"
      fork-join-executor {
        parallelism-min = 2
        parallelism-max = 16
      }
    }
  }
  
  http {
    server {
      idle-timeout = 60 seconds
      request-timeout = 30 seconds
    }
  }
}

# Custom database configuration
database {
  type = "h2"
  type = ${?DB_TYPE}
  url = "jdbc:h2:./data/todo-db;AUTO_SERVER=TRUE"
  url = ${?DB_URL}
  user = ""
  user = ${?DB_USER}
  password = ""
  password = ${?DB_PASSWORD}
}

# Server configuration
server {
  host = "0.0.0.0"
  port = 8080
  port = ${?PORT}
}

# AI Configuration
ai {
  project-id = "oursky-todo-1775160139"
}