# Pekko Test Configuration
pekko {
  actor {
    default-dispatcher {
      type = Dispatcher
      executor = "fork-join-executor"
      fork-join-executor {
        parallelism-min = 2
        parallelism-max = 16
      }
    }
  }
  
  loggers = ["org.apache.pekko.testkit.TestEventListener"]
  log-level = "INFO"
}

database {
  type = "h2"
  url = "jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1"
  user = ""
  password = ""
}