# GCP Deployment Manifest - Optimized for Minimum Cost
# Resource limits tuned for e2-micro/small instances
---
apiVersion: v1
kind: Namespace
metadata:
  name: todo-app-prod
  labels:
    app: todo
    environment: production

---
# Secret will be created by deploy.sh with actual API key and Supabase credentials
apiVersion: v1
kind: Secret
metadata:
  name: todo-secret
  namespace: todo-app-prod
type: Opaque
stringData:
  gemini-api-key: "${GEMINI_API_KEY}"
  qwen-api-key: "${QWEN_API_KEY}"
  supabase-host: "${SUPABASE_HOST}"
  supabase-port: "${SUPABASE_PORT}"
  supabase-user: "${SUPABASE_USER}"
  supabase-password: "${SUPABASE_PASSWORD}"
  supabase-db: "${SUPABASE_DB}"
  supabase-db-url: "jdbc:postgresql://${SUPABASE_HOST}:${SUPABASE_PORT}/${SUPABASE_DB}"

---
# ConfigMap containing database migration scripts
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-migrations
  namespace: todo-app-prod
data:
  V1__initial_schema.sql: |
    -- V1__initial_schema.sql
    -- Initial schema for the todo application
    -- Uses Magnum default CamelToSnakeCase mapping (TodoRow -> todo_row)
    -- Idempotent: safe to run multiple times
    -- PostgreSQL version

    CREATE TABLE IF NOT EXISTS todo_row (
      id BIGSERIAL PRIMARY KEY,
      title VARCHAR(500) NOT NULL,
      completed BOOLEAN NOT NULL DEFAULT false,
      created_at BIGINT NOT NULL
    );

    CREATE TABLE IF NOT EXISTS subtask_row (
      id BIGSERIAL PRIMARY KEY,
      todo_id BIGINT NOT NULL,
      title VARCHAR(500) NOT NULL,
      completed BOOLEAN NOT NULL DEFAULT false,
      parent_id BIGINT,
      depth INT NOT NULL DEFAULT 1,
      CONSTRAINT fk_subtask_todo FOREIGN KEY (todo_id) REFERENCES todo_row(id) ON DELETE CASCADE
    );

    -- Indexes for better query performance
    CREATE INDEX IF NOT EXISTS idx_subtask_todo_id ON subtask_row(todo_id);
    CREATE INDEX IF NOT EXISTS idx_subtask_parent_id ON subtask_row(parent_id);

---
# Backend Deployment - Scala/http4s API server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend-deployment
  namespace: todo-app-prod
  labels:
    app: todo-backend
    version: "v1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: todo-backend
        version: "v1"
      annotations:
        prometheus.io/scrape: "false"  # Disable metrics to save resources
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
      - name: db-migrate
        image: postgres:17-alpine
        command:
        - sh
        - -c
        - |
          echo "Running database migrations..."
          PGPASSWORD="$SUPABASE_PASSWORD" psql \
            -h "$SUPABASE_HOST" \
            -p "$SUPABASE_PORT" \
            -U "$SUPABASE_USER" \
            -d "$SUPABASE_DB" \
            -f /migrations/V1__initial_schema.sql
          echo "Database migration complete"
        env:
        - name: SUPABASE_HOST
          valueFrom:
            secretKeyRef:
              name: todo-secret
              key: supabase-host
        - name: SUPABASE_PORT
          valueFrom:
            secretKeyRef:
              name: todo-secret
              key: supabase-port
        - name: SUPABASE_USER
          valueFrom:
            secretKeyRef:
              name: todo-secret
              key: supabase-user
        - name: SUPABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: todo-secret
              key: supabase-password
        - name: SUPABASE_DB
          valueFrom:
            secretKeyRef:
              name: todo-secret
              key: supabase-db
        volumeMounts:
        - name: migrations
          mountPath: /migrations
          readOnly: true
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
      containers:
      - name: todo-backend
        image: gcr.io/${PROJECT_ID}/todo-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          protocol: TCP
        env:
        - name: QWEN_API_KEY
          valueFrom:
            secretKeyRef:
              name: todo-secret
              key: qwen-api-key
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: todo-secret
              key: gemini-api-key
        - name: DB_TYPE
          value: "postgres"
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: todo-secret
              key: supabase-db-url
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: todo-secret
              key: supabase-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: todo-secret
              key: supabase-password
        - name: JAVA_OPTS
          value: "-Xms64m -Xmx192m -XX:+UseG1GC -XX:MaxGCPauseMillis=50 -Djava.net.preferIPv4Stack=true -XX:MaxMetaspaceSize=128m"
        # Startup probe for slow JVM initialization
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 18
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
      volumes:
      - name: migrations
        configMap:
          name: db-migrations
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - todo-backend
              topologyKey: kubernetes.io/hostname

---
# Backend Service - Internal only (ClusterIP)
apiVersion: v1
kind: Service
metadata:
  name: todo-backend-service
  namespace: todo-app-prod
  labels:
    app: todo-backend
spec:
  type: ClusterIP
  selector:
    app: todo-backend
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http

---
# Frontend Deployment - Vue.js + Nginx
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-frontend-deployment
  namespace: todo-app-prod
  labels:
    app: todo-frontend
    version: "v1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: todo-frontend
        version: "v1"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: todo-frontend
        image: gcr.io/${PROJECT_ID}/todo-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          protocol: TCP
        env:
        - name: VITE_API_BASE_URL
          value: "http://todo-backend-service:8080"
        # MVP resources for e2-micro (minimal nginx footprint)
        resources:
          requests:
            memory: "16Mi"      # Minimal for static serving
            cpu: "10m"         # 0.01 CPU cores
          limits:
            memory: "64Mi"
            cpu: "50m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 101
          capabilities:
            drop:
              - ALL
        volumeMounts:
        - name: tmp-volume
          mountPath: /var/cache/nginx
        - name: run-volume
          mountPath: /var/run
      volumes:
      - name: tmp-volume
        emptyDir: {}
      - name: run-volume
        emptyDir: {}

---
# Frontend Service - LoadBalancer for external access
apiVersion: v1
kind: Service
metadata:
  name: todo-frontend-service
  namespace: todo-app-prod
  labels:
    app: todo-frontend
spec:
  type: LoadBalancer
  selector:
    app: todo-frontend
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  sessionAffinity: None  # No sticky sessions needed for stateless frontend
