services:
  todo-backend-jvm:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8081:8080"
    environment:
      - DB_TYPE=postgres
      - DB_URL=jdbc:postgresql://aws-1-us-east-2.pooler.supabase.com:5432/postgres?sslmode=require
      - DB_USER=REPLACED_SUPABASE_USER
      - DB_PASSWORD=REPLACED_SUPABASE_PASSWORD
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  todo-backend-native:
    build:
      context: .
      dockerfile: Dockerfile.native
    ports:
      - "8082:8080"
    environment:
      - DB_TYPE=postgres
      - DB_URL=jdbc:postgresql://aws-1-us-east-2.pooler.supabase.com:5432/postgres?sslmode=require
      - DB_USER=REPLACED_SUPABASE_USER
      - DB_PASSWORD=REPLACED_SUPABASE_PASSWORD
    healthcheck:
      test: ["CMD", "/app/todo-backend", "--health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
