apiVersion: v1
kind: Secret
metadata:
  name: todo-backend-secrets
type: Opaque
data:
  # Replace with actual base64-encoded values
  # echo -n "your-value" | base64
  DB_USER: <base64-encoded-db-user>
  DB_PASSWORD: <base64-encoded-db-password>
  # Optional AI API keys
  # QWEN_API_KEY: <base64-encoded-key>
  # GEMINI_API_KEY: <base64-encoded-key>
